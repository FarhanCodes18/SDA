<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L286VZ2W2J"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-L286VZ2W2J');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Sukla Digital Academy</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Core Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <!-- Register Card Container -->
  <div class="glass-card auth-card">
    <div class="auth-header">
      <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px;">
        <img src="assets/logo.png" alt="SDA Logo" style="width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--accent-color); object-fit: cover;">
        Sukla Digital Academy
      </a>
      <h2>Create Account</h2>
      <p>Register to unlock practical courses & certifications</p>
    </div>

    <!-- Registration Form -->
    <form id="register-form">
      <div class="auth-form-group">
        <label for="name">Full Name</label>
        <div class="auth-input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="name" class="auth-input" placeholder="Ajay Shukla" required>
        </div>
      </div>

      <div class="auth-form-group">
        <label for="mobile">Mobile Number</label>
        <div class="auth-input-wrapper">
          <i class="fas fa-phone"></i>
          <input type="tel" id="mobile" class="auth-input" placeholder="Enter 10-digit mobile number" required>
        </div>
      </div>

      <div class="auth-form-group">
        <label for="email">Email Address</label>
        <div class="auth-input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" class="auth-input" placeholder="name@example.com" required>
        </div>
      </div>



      <div class="auth-form-group">
        <label for="password">Password</label>
        <div class="auth-input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-primary auth-btn">
        Create Student Account <i class="fas fa-user-plus"></i>
      </button>
    </form>

    <div class="auth-redirect">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // If already logged in, redirect straight to dashboard
      if (Auth.isLoggedIn()) {
        Auth.redirectToDashboard();
      }



      const form = document.getElementById('register-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value.trim();
        const mobile = document.getElementById('mobile').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!name || !mobile || !email || !password) {
          showToast('Please fill in all fields.', 'error');
          return;
        }

        // Validate Mobile Number
        const phoneRegex = /^[6-9]\d{9}$/;
        if (!phoneRegex.test(mobile)) {
          showToast('Please enter a valid 10-digit mobile number starting with 6-9.', 'error');
          return;
        }

        const submitBtn = form.querySelector('button[type="submit"]');
        const originalBtnHTML = submitBtn.innerHTML;

        try {
          submitBtn.disabled = true;
          submitBtn.style.opacity = '0.7';
          submitBtn.innerHTML = 'Creating Account... <i class="fas fa-spinner fa-spin"></i>';

          const response = await apiCall('/register', 'POST', { name, email, password, mobile }, false);
          
          Auth.saveToken(response.token);
          Auth.saveUser(response.user);

          showToast('Registration successful! Welcome to SDA.', 'success');

          setTimeout(() => {
            Auth.redirectToDashboard();
          }, 1200);

        } catch (error) {
          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';
          submitBtn.innerHTML = originalBtnHTML;
          showToast(error.message || 'Registration failed. Try a different email.', 'error');
        }
      });
    });
  </script>
</body>
</html>
